<!DOCTYPE html>
<html>
<head>
    <title>Update Course</title>

    <style>

        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: Arial, sans-serif;

            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            width: 350px;

            box-shadow: 0 0 10px rgba(0,0,0,0.6);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input, textarea {
            width: 100%;
            padding: 8px;

            background-color: #2b2b2b;
            color: #ffffff;

            border: 1px solid #444;
            border-radius: 5px;
        }

        textarea {
            resize: vertical;
            height: 80px;
        }

        button {
            width: 100%;
            padding: 10px;

            background-color: #3a86ff;
            color: white;

            border: none;
            border-radius: 5px;

            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: #2f6fd1;
        }

    </style>

</head>

<body>

<div class="container">

<h2>Update Course Description</h2>

<form method="post" action="/update-course">

    <label>Course name</label><br>
    <input type="text" name="course_name"><br><br>

    <label>New description</label><br>
    <textarea name="description"></textarea><br><br>

    <button type="submit">Update</button>

</form>

</div>

</body>
</html>
