<!DOCTYPE html>
<html>
<head>
    <title>Ask Campus AI</title>
    <link rel="stylesheet" href="/static/css/chat.css">
</head>

<body>

<div class="container">

<h2>Ask Campus AI</h2>

<div class="chat-box">

{% if chat_history %}
    {% for item in chat_history %}
        <div class="message user">
            <strong>You:</strong>
            <p>{{ item.question }}</p>
        </div>

        <div class="message ai">
            <strong>Campus AI:</strong>
            <p>{{ item.answer }}</p>
        </div>
    {% endfor %}
{% endif %}

</div>

<form method="post" class="chat-form">
    <input
        type="text"
        name="question"
        value="{{ question or '' }}"
        placeholder="Ask a question..."
        required
    >
    <button type="submit">Ask</button>
</form>

</div>

</body>
</html>
