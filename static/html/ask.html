<!DOCTYPE html>
<html>
<head>
    <title>Ask Campus AI</title>
</head>
<style>
body {
    font-family: Arial;
    margin: 40px;
}

form {
    margin-bottom: 20px;
}

.answer {
    background: #f4f4f4;
    padding: 10px;
    border-radius: 5px;
}
</style>

<body>

<h2>Ask Campus AI</h2>

<form method="post">
    <input type="text" name="question" value="{{ question or '' }}" placeholder="Ask a question..." required>
    <button type="submit">Ask</button>
</form>

{% if answer %}
<div class="answer">
    <strong>Answer:</strong>
    <p>{{ answer }}</p>
</div>
{% endif %}

</body>
</html>
