<!DOCTYPE html>
<html>
<head>
    <title>Ask Campus AI</title>
    <link rel="stylesheet" href="/static/css/chat.css">
</head>

<body>

<div class="container">

<h2>Ask Campus AI</h2>

<div class="chat-box">

{% if not chat_history %}
<div class="message ai">
    <p>Hello! Ask me anything about your courses.</p>
</div>
{% endif %}

{% for item in chat_history %}
<div class="message user">
    <strong>You:</strong>
    <p>{{ item.question }}</p>
</div>

<div class="message ai">
<strong>Campus AI:</strong>
<p class="ai-text">{{ item.answer }}</p>
</div>
{% endfor %}

</div>

<form method="post" action="/ask" class="chat-form">

<input
    type="text"
    name="question"
    value="{{ question or '' }}"
    placeholder="Ask a question..."
    autocomplete="off"
    required
>

<button type="submit">Ask</button>

<button type="button" onclick="resetChat()">
Reset chat
</button>

<button type="button" onclick="window.location.href='/eladcampus'">
Back to home
</button>

</form>

</div>

<script>

document.addEventListener("DOMContentLoaded", function () {

    const chatBox = document.querySelector(".chat-box");

    if (chatBox) {
        chatBox.scrollTop = chatBox.scrollHeight;
    }

const messages = document.querySelectorAll(".ai-text");

if (messages.length > 0) {

    const msg = messages[messages.length - 1]; // last AI message

    const text = msg.innerText;
    msg.innerText = "";

    let i = 0;

    function typeWriter() {
        if (i < text.length) {
            msg.innerText += text.charAt(i);
            i++;
            setTimeout(typeWriter, 20);
        }
    }

    typeWriter();
}

    const input = document.querySelector("input[name='question']");

    if (input) {
        input.addEventListener("keydown", function(e){
            if(e.key === "Enter"){
                this.form.submit();
            }
        });
    }

});

function resetChat() {

    fetch("/clear-chat", { method: "POST" })
    .then(response => {
        if(response.ok){
            location.reload();
        }
    })
    .catch(err => console.error("Reset failed:", err));

}

</script>


</body>
</html>
